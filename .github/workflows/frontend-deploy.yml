name: Continuous Deployment (Prod) (Frontend)
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'apps/web/**'
      - 'packages/db/**'
      - 'docker/Dockerfile.frontend'
      - '.github/workflows/frontend-deploy.yml'
      - '.github/frontend-trigger'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Verify build context
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in current directory:"
          ls -la | head -20
          echo ""
          echo "Dockerfile location:"
          ls -la ./docker/Dockerfile.frontend
          echo ""
          echo "package.json location:"
          ls -la ./package.json
      
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile.frontend
          push: true
          no-cache: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/user-app-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/user-app-frontend:latest
