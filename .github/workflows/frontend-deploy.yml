name: Continuous Deployment (Prod) (Frontend)
on:
  push:
    branches: [ main ]
    paths:
      - 'apps/web/**'
      - 'packages/db/**'
      - 'docker/Dockerfile.frontend'
      - '.github/workflows/frontend-deploy.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./week-27.2
          file: ./week-27.2/docker/Dockerfile.frontend
          build-args: |
            DB_URL=${{ secrets.DATABASE_URL }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/user-app-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/user-app-frontend:latest
